<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng Ký - MYE</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Header (injected from header.html) ── -->
<div id="header-root"></div>

<main>
  <!-- Card 1: Thông tin tài khoản -->
  <div class="card">
    <h2 class="card-title">ĐĂNG KÝ TÀI KHOẢN</h2>

    <div class="field">
      <span class="field-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </span>
      <input id="regUsername" type="text" placeholder="Tên đăng nhập hoặc Email" autocomplete="username">
    </div>

    <div class="field">
      <span class="field-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </span>
      <input id="pw1" type="password" placeholder="Mật khẩu" autocomplete="new-password">
      <button class="toggle-pw" onclick="togglePw('pw1', this)" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>

    <div class="field">
      <span class="field-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </span>
      <input id="pw2" type="password" placeholder="Nhập lại mật khẩu" autocomplete="new-password">
      <button class="toggle-pw" onclick="togglePw('pw2', this)" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>
  </div>

  <!-- Card 2: Thông tin cá nhân -->
  <div class="card">
    <h2 class="card-title">THÔNG TIN TÀI KHOẢN</h2>

    <div class="form-group">
      <label class="form-label" for="regFullName">Họ và tên(*)</label>
      <input id="regFullName" class="form-input" type="text" placeholder="Nguyễn Văn A">
    </div>

    <div class="form-group">
      <label class="form-label">Giới tính(*)</label>
      <div class="radio-group">
        <label class="radio-label"><input type="radio" name="gender" value="nam" checked> Nam</label>
        <label class="radio-label"><input type="radio" name="gender" value="nu"> Nữ</label>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="regDob">Ngày sinh(*)</label>
      <input id="regDob" class="form-input" type="date">
    </div>

    <div class="form-group">
      <label class="form-label" for="regAddress">Địa chỉ(*)</label>
      <input id="regAddress" class="form-input" type="text" placeholder="Địa chỉ">
    </div>

    <div class="form-group">
      <label class="form-label" for="regEmail">Email(*)</label>
      <input id="regEmail" class="form-input" type="email" placeholder="Email">
    </div>

    <div class="form-group">
      <label class="form-label" for="regPhone">Số điện thoại(*)</label>
      <input id="regPhone" class="form-input" type="tel" placeholder="Số điện thoại">
    </div>

    <div class="captcha-row">
      <input id="captchaInput" class="captcha-input" type="text" placeholder="Mã xác nhận">
      <div id="captchaText" class="captcha-img">------</div>
      <button class="captcha-refresh" onclick="refreshCaptcha()" title="Làm mới mã" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
    </div>

    <button id="btnRegister" class="btn-primary btn-orange">ĐĂNG KÝ</button>
    <p class="terms">Bằng việc click vào nút Đăng Ký, Bạn đã đồng ý với <a href="#">Điều khoản sử dụng</a></p>

    <div class="divider">hoặc</div>

    <button class="btn-primary btn-blue" style="margin-bottom:0" onclick="location.href='dangnhap.html'">ĐĂNG NHẬP</button>
  </div>
</main>

<!-- ── Footer (injected from footer.html) ── -->
<div id="footer-root"></div>

<script src="script.js"></script>
</body>
</html>
