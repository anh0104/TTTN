<header class="ldp-header h-auto w-100 position-relative d-flex align-items-center ">
    <div class="header-inner container-fluid px-5 d-flex justify-content-between align-items-center">
        <a class="header-logo d-flex align-items-center gap-2">
            <img class="img-fluid h-auto d-block" src="assets\iconapp.png" alt="Hào Khí Du Hiệp"
                onerror="this.style.display='none'">
        </a>
        <div class="header-actions d-flex align-items-center gap-3">
            <a href="#" class="header-icon d-flex align-items-center justify-content-center rounded-circle"
                aria-label="Trang chủ"><i class="bi bi-house-door-fill"></i></a>
            <a href="#" class="header-icon d-flex align-items-center justify-content-center rounded-circle"
                aria-label="Facebook"><i class="bi bi-facebook"></i></a>
            <a class="btn-login-img d-inline-flex align-items-center">
                <img class="img-fluid d-block" src="assets/đn.png" alt="Đăng nhập"
                    onerror="this.parentElement.classList.add('img-fallback')">
            </a>
        </div>
    </div>
</header>
