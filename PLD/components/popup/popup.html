<!-- Modal Thể Lệ (Bootstrap 5) – đặt ngoài wrapper để tránh scale transform -->
<div class="modal fade" id="modalTheLe" tabindex="-1" aria-hidden="true" data-bs-backdrop="true"
    data-bs-keyboard="true">
    <div class="modal-dialog modal-dialog-centered ldp-modal__dialog--rules-bs">
        <div class="modal-content ldp-modal__content-transparent">
            <div class="ldp-modal__frame">
                <img class="ldp-modal__img" src="assets/popup_thele.png" alt="Thể lệ">
                <button type="button" class="ldp-modal__close-hotspot" data-bs-dismiss="modal"
                    aria-label="Đóng"></button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Hướng Dẫn (Bootstrap 5) -->
<div class="modal fade" id="modalHuongDan" tabindex="-1" aria-hidden="true" data-bs-backdrop="true"
    data-bs-keyboard="true">
    <div class="modal-dialog modal-dialog-centered ldp-modal__dialog--rules-bs">
        <div class="modal-content ldp-modal__content-transparent">
            <div class="ldp-modal__frame">
                <img class="ldp-modal__img" src="assets/popup_huongdan.png" alt="Hướng dẫn">
                <button type="button" class="ldp-modal__close-hotspot" data-bs-dismiss="modal"
                    aria-label="Đóng"></button>
            </div>
        </div>
    </div>
</div>

<!-- Modal ĐÃ ĐĂNG KÝ THÀNH CÔNG (Bootstrap 5) -->
<div class="modal fade ldp-modal--success-modal" id="modalSuccess" tabindex="-1" aria-hidden="true"
    data-bs-backdrop="true" data-bs-keyboard="true">
    <div class="modal-dialog modal-dialog-centered ldp-modal__dialog-success-bs">
        <div class="modal-content ldp-modal__content-transparent">
            <div class="ldp-modal__frame position-relative">
                <img class="ldp-modal__img img-fluid w-100 d-block h-auto" src="assets/popup_thongbao.png"
                    alt="Thông báo">
                <div
                    class="ldp-modal__success-text position-absolute top-50 start-50 translate-middle text-center fw-bold text-white">
                    Đã đăng ký thành công
                </div>
                <button type="button"
                    class="ldp-modal__close-btn cursor-pointer position-absolute top-0 end-0 border-0 bg-transparent p-0"
                    data-bs-dismiss="modal" aria-label="Đóng">
                    <img class=" d-block" src="assets/exit.png" alt="Đóng">
                </button>
            </div>
        </div>
    </div>
</div>
