<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MISS MISTER HÀO KHÍ DU HIỆP - Đăng ký dự thi</title>
  <link rel="icon" href="assets/iconapp.png">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="css/home.css">
</head>

<body>
  <div class="ldp-wrapper d-flex justify-content-center bg-dark">
    <div class="ldp-stage position-relative" id="ldpStage">
      <header class="ldp-header h-auto w-100 position-relative d-flex align-items-center ">
        <div class="header-inner container-fluid px-5 d-flex justify-content-between align-items-center">
          <a class="header-logo d-flex align-items-center gap-2">
            <img class="img-fluid h-auto d-block" src="assets\iconapp.png" alt="Hào Khí Du Hiệp"
              onerror="this.style.display='none'">
          </a>
          <div class="header-actions d-flex align-items-center gap-3">
            <a href="#" class="header-icon d-flex align-items-center justify-content-center rounded-circle"
              aria-label="Trang chủ"><i class="bi bi-house-door-fill"></i></a>
            <a href="#" class="header-icon d-flex align-items-center justify-content-center rounded-circle"
              aria-label="Facebook"><i class="bi bi-facebook"></i></a>
            <a class="btn-login-img d-inline-flex align-items-center">
              <img class="img-fluid d-block" src="assets/đn.png" alt="Đăng nhập"
                onerror="this.parentElement.classList.add('img-fallback')">
            </a>
          </div>
        </div>
      </header>
      <div class="ldp-bg-wrap  position-relative w-100" style="background-image:url('assets/BGTRANGVOTING.png');">
        <!-- ============ HERO CONTENT ============ -->
        <section class="ldp-hero d-flex flex-column align-items-center w-100 position-relative">
          <div class="hero-content  position-relative d-flex flex-column align-items-center text-center pt-5">
            <img class="hero-game-logo img-fluid position-relative" src="assets/Logo-HaoKhiDuHiep.png"
              alt="Hào Khí Du Hiệp" onerror="this.style.display='none'">

            <div class="hero-title-wrap d-flex justify-content-center align-items-center mt-2">
              <img src="assets\text.png" alt="Miss Mister" class="hero-title-img img-fluid d-block">
            </div>
          </div>
          <nav class="ldp-navtabs mx-auto position-relative d-flex justify-content-between align-items-center">
            <div class="menu-left d-flex align-items-center gap-4">
              <button type="button" class="navtab-img-btn btn p-0 border-0 bg-transparent shadow-none"
                data-bs-toggle="modal" data-bs-target="#modalTheLe">
                <img src="assets/thele.png" alt="Thể lệ">
              </button>

              <button type="button" class="navtab-img-btn btn p-0 border-0 bg-transparent shadow-none"
                data-bs-toggle="modal" data-bs-target="#modalHuongDan">
                <img class="img-fluid d-block" src="assets/hd.png" alt="Hướng dẫn">
              </button>
            </div>
            <a href="vote.html"
              class="navtabs-badge  position-static flex-shrink-0 position-absolute start-50 translate-middle-x">
              <img src="assets/votengay.png" alt="Tham gia ngay">
            </a>
            <div class="menu-right d-flex align-items-center gap-4">
              <a href="#" class="navtab-img-btn">
                <img class="w-100 d-block h-auto" src="assets/taigame.png" alt="Tải game">
              </a>
              <a href="#" class="navtab-img-btn">
                <img class="w-100 d-block h-auto" src="assets/napthe.png" alt="Nạp thẻ">
              </a>
            </div>

          </nav>
          <div class="nav-bottom-frame position-relative d-flex justify-content-center">
            <img class="w-100" src="assets/khungdautrang.png" alt="">
          </div>
        </section>
        <!-- ============ ĐĂNG KÝ DỰ THI ============ -->
        <section class="ldp-register position-relative py-3 pb-5" id="dangky">
          <h2 class="section-title text-center mb-5">
            <img class=" h-auto" src="assets/đkdt.png" alt="Đăng ký dự thi">
          </h2>
          <form class="register-card mx-auto" id="registerForm">
            <div class="row g-4">
              <div class="col-lg-7">
                <div class="upload-group" id="uploadGroup">
                  <label class="upload-main w-100" id="uploadMainLabel" for="fileMain"
                    style="background-image:url('assets/themanh.png');">
                    <input type="file" id="fileMain" accept="image/*" hidden>
                  </label>

                  <div class="uploaded-photos-list d-flex gap-4 w-100 mt-n3" id="uploadedPhotosList">
                    <label
                      class="photo-slot text-white cursor-pointer d-flex align-items-center justify-content-center border-0 flex-fill position-relative rounded-3 d-block"
                      data-slot="1" for="filePhoto1" style="background-image:url('assets/themanhnho.png');">
                      <input type="file" id="filePhoto1" accept="image/*" hidden>
                    </label>
                    <label
                      class="photo-slot text-white cursor-pointer d-flex align-items-center justify-content-centerborder-0 flex-fill position-relative rounded-3 d-block"
                      data-slot="2" for="filePhoto2" style="background-image:url('assets/themanhnho.png');">
                      <input type="file" id="filePhoto2" accept="image/*" hidden>
                    </label>
                    <label
                      class="photo-slot text-white cursor-pointer d-flex align-items-center justify-content-center border-0 flex-fill position-relative rounded-3 d-block"
                      data-slot="3" for="filePhoto3" style="background-image:url('assets/themanhnho.png');">
                      <input type="file" id="filePhoto3" accept="image/*" hidden>
                    </label>
                  </div>
                  <p class="register-note mt-2 text-center text-white fw-normal fst-italic">
                    *Bắt buộc phải đăng ký đủ 4 ảnh dự thi
                  </p>
                </div>
              </div>
              <!-- ============ CỘT THÔNG TIN ============ -->
              <div class="col-lg-5">

                <div class="info-readonly d-flex flex-column gap-3 mb-4">
                  <div><span>Nhân vật:</span> <b>Lục Trà Bạc Hà</b></div>
                  <div><span>Bang hội:</span> <b>Lạc Viên</b></div>
                  <div><span>Máy chủ:</span> <b>S1 - Lý Bạch</b></div>
                </div>
                <div class="contest-type d-flex justify-content-center align-items-center gap-4 mb-4">

                  <label class="type-radio d-flex align-items-center cursor-pointer">
                    <input type="radio" name="contestType" value="miss" checked>
                    <img class="h-auto d-block " src="assets/thimiss.png" alt="Thi Miss">
                  </label>
                  <label class="type-radio d-flex align-items-center">
                    <input type="radio" name="contestType" value="mister">
                    <img class="h-auto d-block" src="assets/thimisster.png" alt="Thi Mister">
                  </label>
                </div>
                <div class="row g-3">
                  <div class="col-12">
                    <input type="text" class="form-control ldp-input w-100"
                      placeholder="Nhập địa chỉ liên hệ nhận thưởng" required>
                  </div>
                  <div class="col-md-6">
                    <input type="tel" class="form-control ldp-input" placeholder="Nhập số điện thoại" required>
                  </div>
                  <div class="col-md-6">
                    <select class="form-control ldp-input" required>
                      <option value="" disabled selected hidden>Chọn khu vực</option>
                      <option value="Miền Bắc">Miền Bắc</option>
                      <option value="Miền Trung">Miền Trung</option>
                      <option value="Miền Nam">Miền Nam</option>
                    </select>
                  </div>
                  <div class="col-12">
                    <div class="ldp-input-label fs-4 text-white my-2">Nhập ảnh CMND/CCCD mặt trước và sau</div>
                  </div>
                  <div class="col-md-6">
                    <label class="ldp-upload-field  cursor-pointer d-block w-100 rounded-3" for="fileCccdFront"
                      style="background-image:url('assets/mattruoc.png');">
                      <input type="file" id="fileCccdFront" accept="image/*" hidden>
                    </label>
                  </div>
                  <div class="col-md-6">
                    <label class="ldp-upload-field d-block w-100 rounded-3" for="fileCccdBack"
                      style="background-image:url('assets/matsau.png');">
                      <input type="file" id="fileCccdBack" accept="image/*" hidden>
                    </label>
                  </div>
                  <div class="col-12">
                    <textarea class="form-control ldp-input ldp-textarea w-100" rows="6"
                      placeholder="Nhập nội dung gửi (nội dung không quá 300 từ)"></textarea>
                  </div>
                  <div class="col-12">
                    <input type="text" class="form-control ldp-input" placeholder="Nhập video dự thi">
                  </div>
                  <div class="col-12">
                    <div class="register-actions d-flex justify-content-center gap-4 mt-0">
                      <button type="submit" class="btn-img-agree flex-fill p-0 border-0 bg-transparent cursor-pointer">
                        <img class="w-100 img-fluid d-block" src="assets/buttondongy.png" alt="Đồng ý">
                      </button>
                      <button type="reset" class="btn-img-cancel flex-fill p-0 border-0 bg-transparent cursor-pointer"
                        id="btnCancel">
                        <img class="w-100 img-fluid d-block" src="assets/buttonhuybo.png" alt="Hủy bỏ">
                      </button>
                    </div>
                  </div>
                </div>
              </div>
          </form>
        </section>
      </div><!-- /.ldp-bg-wrap -->

    </div><!-- /.ldp-stage -->
  </div><!-- /.ldp-wrapper -->

  <!-- Modal Thể Lệ (Bootstrap 5) – đặt ngoài wrapper để tránh scale transform -->
  <div class="modal fade" id="modalTheLe" tabindex="-1" aria-hidden="true" data-bs-backdrop="true"
    data-bs-keyboard="true">
    <div class="modal-dialog modal-dialog-centered ldp-modal__dialog--rules-bs">
      <div class="modal-content ldp-modal__content-transparent">
        <div class="ldp-modal__frame">
          <img class="ldp-modal__img" src="assets/popup_thele.png" alt="Thể lệ">
          <button type="button" class="ldp-modal__close-hotspot" data-bs-dismiss="modal" aria-label="Đóng"></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Hướng Dẫn (Bootstrap 5) -->
  <div class="modal fade" id="modalHuongDan" tabindex="-1" aria-hidden="true" data-bs-backdrop="true"
    data-bs-keyboard="true">
    <div class="modal-dialog modal-dialog-centered ldp-modal__dialog--rules-bs">
      <div class="modal-content ldp-modal__content-transparent">
        <div class="ldp-modal__frame">
          <img class="ldp-modal__img" src="assets/popup_huongdan.png" alt="Hướng dẫn">
          <button type="button" class="ldp-modal__close-hotspot" data-bs-dismiss="modal" aria-label="Đóng"></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal ĐÃ ĐĂNG KÝ THÀNH CÔNG (Bootstrap 5) -->
  <div class="modal fade ldp-modal--success-modal" id="modalSuccess" tabindex="-1" aria-hidden="true"
    data-bs-backdrop="true" data-bs-keyboard="true">
    <div class="modal-dialog modal-dialog-centered ldp-modal__dialog-success-bs">
      <div class="modal-content ldp-modal__content-transparent">
        <div class="ldp-modal__frame position-relative">
          <img class="ldp-modal__img img-fluid w-100 d-block h-auto" src="assets/popup_thongbao.png" alt="Thông báo">
          <div
            class="ldp-modal__success-text position-absolute top-50 start-50 translate-middle text-center fw-bold text-white">
            Đã đăng ký thành công
          </div>
          <button type="button"
            class="ldp-modal__close-btn cursor-pointer position-absolute top-0 end-0 border-0 bg-transparent p-0"
            data-bs-dismiss="modal" aria-label="Đóng">
            <img class=" d-block" src="assets/exit.png" alt="Đóng">
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
  <script src="js/home.js"></script>
</body>

</html>
