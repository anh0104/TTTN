  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
  <script>
    (function () {
      const components = [
        { selector: '#header-placeholder', url: 'components/header/header-vote.html' },
        { selector: '#navbar-placeholder', url: 'components/navbar/navbar-vote.html' },
        { selector: '#popup-placeholder', url: 'components/popup/popup-vote.html' }
      ];
      let loadedCount = 0;
      components.forEach(comp => {
        fetch(comp.url)
          .then(r => r.text())
          .then(html => {
            const el = document.getElementById(comp.selector.substring(1));
            if (el) el.outerHTML = html;
            loadedCount++;
            if (loadedCount === components.length) {
              // Sequentially load home.js, popup.js, then vote.js
              loadScript('js/home.js', () => {
                loadScript('components/popup/popup.js', () => {
                  loadScript('js/vote.js', () => {
                    // Trigger DOM events so that vote.js DOMContentLoaded fires
                    document.dispatchEvent(new Event('DOMContentLoaded'));
                    window.dispatchEvent(new Event('load'));
                  });
                });
              });
            }
          })
          .catch(err => console.error('Error loading component:', comp.url, err));
      });

      function loadScript(src, cb) {
        const s = document.createElement('script');
        s.src = src;
        s.onload = cb;
        document.body.appendChild(s);
      }
    })();
  </script>
